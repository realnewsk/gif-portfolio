<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALNEWSK | Portfolio</title>
    <link rel="icon" type="image/png" href="Slovak.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0B0B0F;
            --card-bg: #14141A;
            --accent-color: #00F3FF;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --nav-height: 80px;
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* --- Admin Bar --- */
        #admin-bar {
            display: none; position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: #14141A; padding: 20px; border-radius: 12px;
            border: 1px solid var(--accent-color); width: 90%; max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        #auto-input {
            width: 100%; background: #000; border: 1px solid #333; color: white;
            padding: 12px; border-radius: 8px; outline: none; font-family: inherit;
        }

        /* --- Navigation --- */
        .navbar {
            height: var(--nav-height); display: flex; justify-content: space-between;
            align-items: center; padding: 0 5%; position: fixed; top: 0; width: 100%;
            z-index: 1000; background: rgba(11, 11, 15, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo { font-size: 1.5rem; font-weight: 800; }
        .logo span { color: var(--accent-color); }
        .filters { display: flex; list-style: none; gap: 2rem; }
        .filter-item {
            font-size: 0.9rem; color: var(--text-secondary); cursor: pointer;
            transition: var(--transition); text-transform: uppercase; font-weight: 600;
        }
        .filter-item:hover, .filter-item.active { color: var(--accent-color); }

        /* --- Hero --- */
        .hero { margin-top: calc(var(--nav-height) + 4rem); padding: 0 5%; text-align: center; margin-bottom: 5rem; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 800; letter-spacing: -2px; }
        .accent-text { color: var(--accent-color); text-shadow: 0 0 30px rgba(0, 243, 255, 0.3); }
        .hero-subtitle { color: var(--text-secondary); }

        /* --- Grid --- */
        .container { padding: 0 5% 5rem 5%; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
        .portfolio-card {
            border-radius: 16px; overflow: hidden; background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05); transition: var(--transition);
            cursor: pointer; position: relative; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-inner { position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden; }
        .portfolio-card img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .portfolio-card:hover { transform: translateY(-10px); border-color: var(--accent-color); }
        .portfolio-card:hover img { transform: scale(1.1); }

        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0; transform: translateY(10px); transition: var(--transition);
        }
        .portfolio-card:hover .card-overlay { opacity: 1; transform: translateY(0); }

        /* --- Lightbox --- */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: none; justify-content: center;
            align-items: center; z-index: 3000;
        }
        .lightbox img { max-width: 90%; max-height: 80vh; border-radius: 8px; box-shadow: 0 0 40px var(--accent-color); }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 3rem; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Admin Logic -->
    <div id="admin-bar">
        <input type="text" id="auto-input" placeholder="Paste: Link Title #Slovakia #Kosice">
        <p style="font-size: 11px; color: #8E8E93; margin-top: 10px;">Password verified. Press Enter to save to this browser.</p>
    </div>

    <nav class="navbar">
        <div class="logo">REALNEWSK<span>.</span></div>
        <ul class="filters">
            <li class="filter-item active" data-filter="all">All</li>
            <li class="filter-item" data-filter="slovakia">Slovakia</li>
            <li class="filter-item" data-filter="košice">Košice</li>
            <li class="filter-item" data-filter="others">Others</li>
        </ul>
    </nav>

    <header class="hero">
        <h1 class="hero-title">My Hobby <span class="accent-text">Portfolio</span></h1>
        <p class="hero-subtitle">My Slovak GIF collection. :?)</p>
    </header>

    <main class="container">
        <div class="portfolio-grid" id="main-grid">
            <!-- Items load automatically from script below -->
        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn">×</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        const ADMIN_PASSWORD = "1234"; 
        const grid = document.getElementById('main-grid');
        const autoInput = document.getElementById('auto-input');
        const adminBar = document.getElementById('admin-bar');

        // --- THE FIX: ADD YOUR GIFS HERE TO MAKE THEM PERMANENT ---
        const defaultItems = [
            { url: "https://media.giphy.com/media/Hjx8HDofFSJfq6m7ZU/giphy.gif", title: "To Je Vrchol!", cat: "slovakia", sub: "Slovakia" },
            { url: "https://media.giphy.com/media/dMFk1QUFAZWXNx7YA6/giphy.gif", title: "Je To Vrchol?", cat: "slovakia", sub: "Slovakia" },
            { url: "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNmw1ZHA0YmZ0bHgxcG5scHFjdmNzNWF5Zmx2YWxja3AxbjZvbnlkciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/aMQuzzO6K9XwwK6Pk9/giphy.gif", title: "Košice Ohromené", cat: "košice", sub: "Košice" },
            { url: "https://media.giphy.com/media/ZUPpLR8LjP9zkhNgVF/giphy.gif", title: "Ja Na Luniku Ix", cat: "košice", sub: "Košice" },
            { url: "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExenJseGxhMTZuM3Y5MmVqOHloc3I5b2hidm00cnBoancxeDVxcmtidyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/CKR3gjmoOYE1zpFvcP/giphy.gif", title: "Lunik IX", cat: "košice", sub: "Košice" },
            { url: "https://media.giphy.com/media/QfLptdB96eDbjCIVVF/giphy.gif", title: "Ja V Japonsku", cat: "slovakia", sub: "Slovakia" }
        ];

        // Combine permanent items with browser memory
        let myItems = JSON.parse(localStorage.getItem('myPortfolioItems')) || [];
        
        // Merge them so default items are always first
        let allItems = [...defaultItems, ...myItems];

        function renderGrid() {
            grid.innerHTML = '';
            allItems.forEach(item => createCardElement(item));
        }

        function createCardElement(item) {
            const card = document.createElement('div');
            card.className = 'portfolio-card';
            card.setAttribute('data-category', item.cat.toLowerCase());
            card.innerHTML = `
                <div class="card-inner" onclick="openLightbox(this)">
                    <img src="${item.url}" alt="${item.title}">
                    <div class="card-overlay">
                        <h3>${item.title}</h3>
                        <p>${item.sub}</p>
                    </div>
                </div>
            `;
            grid.prepend(card);
        }

        // Admin Security
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a' && e.target.tagName !== 'INPUT') {
                const pass = prompt("Enter Admin Password:");
                if (pass === ADMIN_PASSWORD) {
                    adminBar.style.display = 'block';
                    autoInput.focus();
                }
            }
        });

        // Input Logic
        autoInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = this.value;
                const urlMatch = val.match(/\bhttps?:\/\/\S+/gi);
                const url = urlMatch ? urlMatch[0] : "";
                const tags = val.match(/#[^\s#]+/g) || [];
                const catRaw = tags[0] ? tags[0].replace('#', '') : "others";
                const subRaw = tags[1] ? tags[1].replace('#', '') : catRaw;

                let title = val.replace(url, '').replace(/#[^\s#]+/g, '').trim();
                title = title.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
                
                if (url) {
                    const newItem = { url, title, cat: catRaw.toLowerCase(), sub: subRaw };
                    myItems.push(newItem);
                    localStorage.setItem('myPortfolioItems', JSON.stringify(myItems));
                    createCardElement(newItem);
                    this.value = "";
                    adminBar.style.display = 'none';
                    alert("Added! To make this permanent for everyone, copy the code and add it to defaultItems in the script.");
                }
            }
        });

        // Filters
        document.querySelector('.filters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-item')) {
                const filter = e.target.getAttribute('data-filter');
                document.querySelectorAll('.filter-item').forEach(li => li.classList.remove('active'));
                e.target.classList.add('active');
                document.querySelectorAll('.portfolio-card').forEach(card => {
                    const cardCat = card.getAttribute('data-category');
                    card.style.display = (filter === 'all' || cardCat === filter) ? 'block' : 'none';
                });
            }
        });

        // Lightbox
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        function openLightbox(el) { lbImg.src = el.querySelector('img').src; lb.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeLightbox() { lb.style.display = 'none'; document.body.style.overflow = 'auto'; }

        renderGrid();
    </script>
</body>
</html>
